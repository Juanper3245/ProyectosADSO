<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora Pro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-2">
      <div class="row">
        <div class="col-6">
          <a href="index.html">
            <button class="btn btn-primary w-200">CALCULADORA CIENTIFICA</button>
          </a>
        </div>
        <div class="col-6">
          <a href="grados.html">
            <button class="btn btn-secondary w-100">
              CALCULADORA DE GRADOS
            </button>
          </a>
        </div>
      </div>
    </div>
        <div class="container">
      <div class="row">
          Ingresa la altura
        <div class="col-12">
          <input
            type="text"
            id="altura"
            class="form-control barra"
            placeholder="0"   
           
          />
        </div>
      </div>
            <div class="row">
          Ingresa tu peso en kg
        <div class="col-12">
          <input
            type="text"
            id="peso"
            class="form-control barra"
            placeholder="0"   
           
          />
        </div>
      </div>
          <div class="row">
            Tu I.M.C es de:
        <div class="col-12">
          <input
            type="text"
            id="resultadoIMC"
            class="form-control barra"
            placeholder="0"
           
          />
        </div>
         <div class="col-3">
          <button class="btn btn-danger btn-calc w-100" onclick="calcularIMC()">
            Calcular
          </button>
        </div>
         <div class="col-3">
          <button class="btn btn-danger btn-calc w-100" onclick="limpiarIMC()">
            Borrar
          </button>
        </div>
      </div>

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
