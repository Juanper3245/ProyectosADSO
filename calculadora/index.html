<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora Pro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-2">
      <div class="row">
        <div class="col-6">
          <a href="imc.html">
            <button class="btn btn-primary w-200">CALCULADORA I.M.C</button>
          </a>
        </div>
        <div class="col-6">
          <a href="grados.html">
            <button class="btn btn-secondary w-100">
              CALCULADORA DE GRADOS
            </button>
          </a>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="row">
        <div class="col-12">
          <input
            type="text"
            id="resultado"
            class="form-control barra"
            placeholder="0"
            readonly
          />
        </div>
      </div>

      <div class="row g-2">
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="escribirUno()">
            1
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="escribirDos()">
            2
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="escribirTres()">
            3
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-light btn-calc w-100"
            onclick="escribirCuatro()"
          >
            4
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-light btn-calc w-100"
            onclick="escribirCinco()"
          >
            5
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="escribirSeis()">
            6
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-light btn-calc w-100"
            onclick="escribirSiete()"
          >
            7
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="escribirOcho()">
            8
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-light btn-calc w-100"
            onclick="escribirNueve()"
          >
            9
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="escribirCero()">
            0
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="division()">
            /
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-light btn-calc w-100"
            onclick="multiplicacion()"
          >
            *
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="restar()">
            -
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="punto()">
            .
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="sumar()">
            +
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="ramdon()">
            Rnd
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="log()">
            log
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="ln()">
            ln
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="seno()">
            sen
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="coseno()">
            cos
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="tangente()">
            tan
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="cosecante()">
            Sen-1
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="secante()">
            Cos-1
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="cotangente()">
            Tan-1
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-light btn-calc w-100"
            onclick="potenciaCuadrada()"
          >
            ^²
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-light btn-calc w-100"
            onclick="potenciaCubica()"
          >
            ^³
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="raizcuadrada()">
            raizcuadrada
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="raizcubica()">
            raizcubica
          </button>
        </div>

        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="redondear()">
            Redondear
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light btn-calc w-100" onclick="calcular()">
            =
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-danger btn-calc w-100" onclick="limpiar()">
            AC
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
